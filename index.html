<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战争技术金融事件可视化平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://map.qq.com/api/gljs?v=1.exp&key=CJVBZ-RCLEQ-UNW5P-4BWFK-IHQYS-CMF33&libraries=visualization"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
                background: #0a0a0f;
                color: #e5e5e5;
            }
            h1, h2, h3 {
                font-family: 'Playfair Display', serif;
            }
        }
        @layer components {
            .glass-panel {
                background: rgba(20, 20, 30, 0.8);
                backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .gradient-text {
                background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .event-card {
                transition: all 0.3s ease;
                cursor: pointer;
            }
            .event-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            }
            .tab-button {
                transition: all 0.2s ease;
            }
            .tab-button.active {
                background: rgba(255, 255, 255, 0.1);
                border-bottom: 2px solid #48dbfb;
            }
            .timeline-item {
                position: relative;
                padding-left: 30px;
                border-left: 2px solid rgba(255, 255, 255, 0.1);
            }
            .timeline-item::before {
                content: '';
                position: absolute;
                left: -6px;
                top: 0;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: #48dbfb;
            }
            .war-event::before { background: #ff6b6b; }
            .tech-event::before { background: #feca57; }
            .finance-event::before { background: #48dbfb; }
            .relation-event::before { background: #ff9ff3; }
            
            #map {
                height: 100vh;
                width: 100%;
                background: #0a0a0f;
            }
            .impact-badge {
                padding: 2px 8px;
                border-radius: 12px;
                font-size: 10px;
                font-weight: 600;
            }
            .impact-very_high { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
            .impact-high { background: rgba(254, 202, 87, 0.2); color: #feca57; }
            .impact-medium { background: rgba(72, 219, 251, 0.2); color: #48dbfb; }
            .impact-low { background: rgba(150, 206, 180, 0.2); color: #96ceb4; }
            
            .custom-info-window {
                background: rgba(30, 30, 40, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                padding: 16px;
                color: #e5e5e5;
                min-width: 280px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            
            .loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(10, 10, 15, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
        }
    </style>
</head>
<body class="antialiased overflow-hidden">

        function initMap() {
            try {
                map = new TMap.Map('map', {
                    center: new TMap.LatLng(30, 10),
                    zoom: 2,
                    mapStyleId: 'style1',
                    viewMode: '2D'
                });

                infoWindow = new TMap.InfoWindow({
                    map: map,
                    position: new TMap.LatLng(30, 10),
                    offset: new TMap.Point(0, -32)
                });
                infoWindow.close();

                console.log('腾讯地图初始化成功');
            } catch (error) {
                console.error('腾讯地图初始化失败:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="text-center">
                        <p class="text-red-500 text-lg mb-4">地图初始化失败</p>
                        <p class="text-gray-400 text-sm">请检查腾讯地图API密钥配置</p>
                        <p class="text-gray-500 text-xs mt-2">错误信息: ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderEventMarkers() {
            if (!map || !dotLayer) {
                console.warn('地图或图层未初始化');
                return;
            }

            const dotData = filteredEvents.map(event => ({
                lat: event.lat,
                lng: event.lng,
                styleId: `event_${event.event_type}_${event.impact_level}`,
                properties: event
            }));

            try {
                dotLayer.setData(dotData);
                console.log(`成功渲染 ${dotData.length} 个事件标记`);
            } catch (error) {
                console.error('渲染事件标记失败:', error);
            }
        }

        function createDotLayer() {
            if (!map) {
                console.warn('地图未初始化，无法创建图层');
                return;
            }

            try {
                const styles = {};
                
                Object.keys(EVENT_COLORS).forEach(eventType => {
                    ['very_high', 'high', 'medium'].forEach(impact => {
                        const styleKey = `event_${eventType}_${impact}`;
                        const radius = impact === 'very_high' ? 12 : impact === 'high' ? 9 : 6;
                        
                        styles[styleKey] = {
                            type: 'circle',
                            fillColor: EVENT_COLORS[eventType],
                            radius: radius,
                            strokeColor: 'rgba(255, 255, 255, 0.8)',
                            strokeWidth: 2,
                            fillOpacity: 0.8
                        };
                    });
                });

                dotLayer = new TMap.visualization.Dot({
                    styles: styles,
                    faceTo: 'screen',
                    enableBloom: true,
                    processAnimation: {
                        enable: true,
                        animationType: 'radiated',
                        duration: 2000,
                        repeat: Infinity
                    }
                }).addTo(map);

                dotLayer.on('click', function(evt) {
                    if (evt.detail && evt.detail.dot && evt.detail.dot.properties) {
                        const event = evt.detail.dot.properties;
                        showEventInfo(event);
                        map.setCenter(new TMap.LatLng(event.lat, event.lng));
                    }
                });

                dotLayer.on('hover', function(evt) {
                    if (evt.detail && evt.detail.dot) {
                        document.getElementById('map').style.cursor = 'pointer';
                    } else {
                        document.getElementById('map').style.cursor = 'default';
                    }
                });

                console.log('散点图层创建成功');
            } catch (error) {
                console.error('创建散点图层失败:', error);
            }
        }

        function showEventInfo(event) {
            const content = `
                <div class="custom-info-window">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-2xl">${event.icon}</span>
                        <div class="font-bold text-lg">${event.event_name}</div>
                    </div>
                    <div class="mb-3">
                        <span class="impact-badge impact-${event.impact_level}">${event.impact_level}</span>
                    </div>
                    <div class="space-y-2 text-sm">
                        <div><strong>ID:</strong> ${event.event_id}</div>
                        <div><strong>类型:</strong> ${event.event_type}</div>
                        <div><strong>时间:</strong> ${event.start_date} - ${event.end_date}</div>
                        <div><strong>地点:</strong> ${event.location}</div>
                        <div><strong>参与方:</strong> ${event.parties_involved}</div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-gray-600">
                        <strong>描述:</strong>
                        <p class="text-gray-300 text-sm mt-1">${event.description}</p>
                    </div>
                    <div class="text-xs text-gray-500 mt-3">
                        数据来源: ${event.data_source}
                    </div>
                </div>
            `;

            infoWindow.setContent(content);
            infoWindow.setPosition(new TMap.LatLng(event.lat, event.lng));
            infoWindow.open();

            showEventDetails(event);
        }

        function showEventDetails(event) {
            const detailsPanel = document.getElementById('event-details');
            const detailsContent = document.getElementById('event-details-content');
            
            let relatedEvents = '';
            if (event.related_war_id) {
                const relatedWar = allEvents.find(e => e.event_id === event.related_war_id);
                if (relatedWar) {
                    relatedEvents += `<div class="text-sm p-2 bg-red-900 bg-opacity-20 rounded mt-2">
                        <strong>相关战争:</strong> ${relatedWar.event_name}
                    </div>`;
                }
            }
            if (event.related_tech_id) {
                const relatedTech = allEvents.find(e => e.event_id === event.related_tech_id);
                if (relatedTech) {
                    relatedEvents += `<div class="text-sm p-2 bg-yellow-900 bg-opacity-20 rounded mt-2">
                        <strong>相关技术:</strong> ${relatedTech.event_name}
                    </div>`;
                }
            }
            if (event.related_finance_id) {
                const relatedFinance = allEvents.find(e => e.event_id === event.related_finance_id);
                if (relatedFinance) {
                    relatedEvents += `<div class="text-sm p-2 bg-blue-900 bg-opacity-20 rounded mt-2">
                        <strong>相关金融:</strong> ${relatedFinance.event_name}
                    </div>`;
                }
            }

            detailsContent.innerHTML = `
                <div class="space-y-3">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">${event.icon}</span>
                        <div class="font-bold text-lg">${event.event_name}</div>
                    </div>
                    <div>
                        <span class="impact-badge impact-${event.impact_level}">${event.impact_level}</span>
                    </div>
                    <div class="text-sm text-gray-400">
                        <div><strong>ID:</strong> ${event.event_id}</div>
                        <div><strong>类型:</strong> ${event.event_type}</div>
                        <div><strong>时间:</strong> ${event.start_date} - ${event.end_date}</div>
                        <div><strong>地点:</strong> ${event.location}</div>
                        <div><strong>参与方:</strong> ${event.parties_involved}</div>
                    </div>
                    <div class="text-sm border-t border-gray-700 pt-3">
                        <strong>描述:</strong>
                        <p class="text-gray-300 mt-1">${event.description}</p>
                    </div>
                    ${relatedEvents ? `<div class="border-t border-gray-700 pt-3">${relatedEvents}</div>` : ''}
                    <div class="text-xs text-gray-500 pt-2">
                        数据来源: ${event.data_source}
                    </div>
                </div>
            `;
            
            detailsPanel.classList.remove('hidden');
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            const sortedEvents = [...filteredEvents].sort((a, b) => 
                new Date(a.start_date) - new Date(b.start_date)
            );

            sortedEvents.forEach(event => {
                const item = document.createElement('div');
                item.className = `timeline-item ${event.event_type}-event pb-4`;
                item.innerHTML = `
                    <div class="event-card glass-panel rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-lg">${event.icon}</span>
                            <div class="font-semibold text-sm">${event.event_name}</div>
                        </div>
                        <div class="text-xs text-gray-400 mb-1">${event.start_date}</div>
                        <div class="text-xs text-gray-500 line-clamp-2">${event.description}</div>
                        <div class="mt-2">
                            <span class="impact-badge impact-${event.impact_level}">${event.impact_level}</span>
                        </div>
                    </div>
                `;
                item.addEventListener('click', () => {
                    showEventDetails(event);
                    if (map) {
                        map.setCenter(new TMap.LatLng(event.lat, event.lng));
                        map.setZoom(4);
                    }
                });
                container.appendChild(item);
            });
        }

        function renderRelations() {
            const container = document.getElementById('relations-container');
            container.innerHTML = '';

            const relations = filteredEvents.filter(e => e.event_type === 'relation');

            relations.forEach(relation => {
                const item = document.createElement('div');
                item.className = 'event-card glass-panel rounded-lg p-3';
                
                let sourceEvent = allEvents.find(e => e.event_id === relation.related_war_id) ||
                                  allEvents.find(e => e.event_id === relation.related_tech_id) ||
                                  allEvents.find(e => e.event_id === relation.related_finance_id);
                
                let targetEvent = allEvents.find(e => e.event_id === relation.related_tech_id) ||
                                  allEvents.find(e => e.event_id === relation.related_finance_id);

                item.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-lg">🔗</span>
                        <div class="font-semibold text-sm">${relation.event_name}</div>
                    </div>
                    <div class="text-xs text-gray-400 mb-2">${relation.start_date}</div>
                    <div class="text-xs text-gray-300 mb-2">${relation.description}</div>
                    ${sourceEvent ? `
                    <div class="text-xs p-2 bg-gray-800 rounded mb-1">
                        <strong>来源:</strong> ${sourceEvent.event_name}
                    </div>` : ''}
                    ${targetEvent ? `
                    <div class="text-xs p-2 bg-gray-800 rounded">
                        <strong>目标:</strong> ${targetEvent.event_name}
                    </div>` : ''}
                    <div class="mt-2">
                        <span class="impact-badge impact-${relation.impact_level}">${relation.impact_level}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function applyFilters() {
            const enabledTypes = Array.from(document.querySelectorAll('.event-filter:checked'))
                .map(cb => cb.dataset.type);
            
            const enabledImpacts = Array.from(document.querySelectorAll('.impact-filter:checked'))
                .map(cb => cb.dataset.level);
            
            const startYear = parseInt(document.getElementById('start-year').value);
            const endYear = parseInt(document.getElementById('end-year').value);

            filteredEvents = allEvents.filter(event => {
                const typeMatch = enabledTypes.includes(event.event_type);
                const impactMatch = enabledImpacts.includes(event.impact_level);
                const yearMatch = event.start_date >= `${startYear}-01-01` && 
                                 event.start_date <= `${endYear}-12-31`;
                
                return typeMatch && impactMatch && yearMatch;
            });

            renderEventMarkers();
            renderTimeline();
            renderRelations();
            updateStats();
        }

        function updateStats() {
            const wars = filteredEvents.filter(e => e.event_type === 'war').length;
            const tech = filteredEvents.filter(e => e.event_type === 'technology').length;
            const finance = filteredEvents.filter(e => e.event_type === 'finance').length;
            const relations = filteredEvents.filter(e => e.event_type === 'relation').length;

            document.getElementById('total-wars').textContent = wars;
            document.getElementById('total-tech').textContent = tech;
            document.getElementById('total-finance').textContent = finance;
            document.getElementById('total-relations').textContent = relations;
        }

        function initEventListeners() {
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.add('hidden');
                    });
                    
                    const tabId = `tab-${this.dataset.tab}`;
                    document.getElementById(tabId).classList.remove('hidden');
                });
            });

            document.querySelectorAll('.event-filter, .impact-filter').forEach(filter => {
                filter.addEventListener('change', applyFilters);
            });

            document.getElementById('start-year').addEventListener('change', applyFilters);
            document.getElementById('end-year').addEventListener('change', applyFilters);

            document.getElementById('reset-view').addEventListener('click', () => {
                if (map) {
                    map.setCenter(new TMap.LatLng(30, 10));
                    map.setZoom(2);
                }
                document.getElementById('event-details').classList.add('hidden');
                if (infoWindow) {
                    infoWindow.close();
                }
            });

            document.getElementById('toggle-sidebar').addEventListener('click', () => {
                const sidebar = document.querySelector('.w-96');
                sidebar.classList.toggle('hidden');
            });
        }

        function initApp() {
            console.log('开始初始化应用...');
            
            parseCSVData();
            console.log(`解析了 ${allEvents.length} 个事件`);
            
            initMap();
            
            setTimeout(() => {
                if (map) {
                    createDotLayer();
                    renderEventMarkers();
                    renderTimeline();
                    renderRelations();
                    updateStats();
                    
                    document.getElementById('loading').style.display = 'none';
                    console.log('应用初始化完成');
                } else {
                    console.error('地图初始化超时');
                }
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            initEventListeners();
            
            if (typeof TMap !== 'undefined') {
                initApp();
            } else {
                console.error('腾讯地图API未加载');
                document.getElementById('loading').innerHTML = `
                    <div class="text-center">
                        <p class="text-red-500 text-lg mb-4">腾讯地图API加载失败</p>
                        <p class="text-gray-400 text-sm">请检查网络连接和API密钥配置</p>
                        <p class="text-gray-500 text-xs mt-2">请将代码中的 YOUR_KEY 替换为您的腾讯地图API密钥</p>
                    </div>
                `;
            }
        });
